name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  aiken:
    name: Aiken check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Aiken v1.1.13
        run: |
          curl -L -o aiken.tar.gz https://github.com/aiken-lang/aiken/releases/download/v1.1.13/aiken-x86_64-unknown-linux-musl.tar.gz
          tar xzf aiken.tar.gz
          AIKEN_BIN=$(find . -name 'aiken' -type f | head -1)
          sudo mv "$AIKEN_BIN" /usr/local/bin/aiken
          aiken --version

      - name: Run tests
        run: aiken check

      - name: Build validators
        run: aiken build

      - name: Upload plutus.json
        uses: actions/upload-artifact@v4
        with:
          name: plutus-json
          path: plutus.json

  sdk:
    name: SDK typecheck & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: sdk/package-lock.json

      - name: Install SDK dependencies
        working-directory: sdk
        run: npm ci

      - name: Type-check SDK
        working-directory: sdk
        run: npx tsc --noEmit

      - name: Run SDK unit tests
        working-directory: sdk
        run: npx tsx --test src/test/validation.test.ts
