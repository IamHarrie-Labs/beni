<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Beni — Guardrails for AI-powered money</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Caveat:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M16 1.5L28.2 6.4V15.5C28.2 22.7 23.1 28.8 16 30.5C8.9 28.8 3.8 22.7 3.8 15.5V6.4L16 1.5Z' stroke='%23bcd0ff' stroke-width='1.6' fill='none'/%3E%3Ccircle cx='16' cy='16' r='3.2' stroke='%23bcd0ff' stroke-width='1.4' fill='none'/%3E%3Ccircle cx='16' cy='16' r='1.1' fill='%23bcd0ff'/%3E%3C/svg%3E"/>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Load order matters: components.jsx first (exports useWallet, WalletConnect, WalletModal, etc.) -->
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="landing.jsx"></script>
  <script type="text/babel" src="dashboard.jsx"></script>
  <script type="text/babel" src="pages.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      // Never start on dashboard — must connect wallet first
      const [page, setPage] = useState(() => {
        const h = window.location.hash.replace("#", "");
        return ["landing", "security", "docs"].includes(h) ? h : "landing";
      });

      // Wallet state — shared across the whole app
      const wallet = useWallet();

      // When someone tries to open Beni without a wallet, show the picker modal
      const [showWalletModal, setShowWalletModal] = useState(false);

      // Once wallet connects while the modal is open → go straight to dashboard
      useEffect(() => {
        if (wallet.connected && showWalletModal) {
          setShowWalletModal(false);
          setPage("dashboard");
        }
      }, [wallet.connected]);

      useEffect(() => {
        window.location.hash = page;
        window.scrollTo({ top: 0, behavior: "instant" });
      }, [page]);

      // Gate the dashboard behind wallet connection
      function navigateTo(target) {
        if (target === "dashboard" && !wallet.connected) {
          setShowWalletModal(true);   // show wallet picker overlay
          return;
        }
        setShowWalletModal(false);
        setPage(target);
      }

      let body;
      if (page === "landing")        body = <Landing setPage={navigateTo}/>;
      else if (page === "dashboard") body = <Dashboard wallet={wallet}/>;
      else if (page === "security")  body = <SecurityPage/>;
      else if (page === "docs")      body = <DocsPage/>;
      // Dashboard + Docs are full-bleed; others show the footer
      const showFooter = page === "landing" || page === "security";

      return (
        <>
          <GlobalDefs/>
          <TopNav page={page} setPage={navigateTo} wallet={wallet}/>
          {body}
          {showFooter && <Footer setPage={navigateTo}/>}

          {/* Wallet picker modal — appears over any page when wallet connection is required */}
          {showWalletModal && (
            <WalletModal wallet={wallet} onClose={() => setShowWalletModal(false)}/>
          )}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
